version: '3.8'

services:
  db:
    image: postgres:14.3
    container_name: sgm_db_container
    restart: always
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.0-alpine
    container_name: sgm_redis_container
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres-data: